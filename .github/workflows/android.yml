name: Android CI

on:
  push:
    branches: [ master, 'claude/**' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin

      - name: Compile debug unit test Kotlin
        run: ./gradlew :app:compileDebugUnitTestKotlin

      - name: Compile debug Android test Kotlin
        run: ./gradlew :app:compileDebugAndroidTestKotlin

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

  instrumented-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator
        run: |
          sdkmanager --install "emulator" "platform-tools" \
            "system-images;android-34;google_apis;x86_64" \
            "platforms;android-34"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name test_avd \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start emulator and run tests
        run: |
          emulator -avd test_avd \
            -no-window -no-audio -no-snapshot \
            -no-boot-anim -gpu swiftshader_indirect &
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
          adb shell input keyevent 82
          ./gradlew :app:connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/connected/
