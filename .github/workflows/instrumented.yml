name: Instrumented Tests

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install emulator packages
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "emulator" \
            "platform-tools" \
            "system-images;android-34;google_apis;x86_64" \
            "platforms;android-34"

      - name: Create AVD
        run: |
          echo "no" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager create avd \
            --name test_avd \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6"

      - name: Start emulator and run tests
        run: |
          $ANDROID_SDK_ROOT/emulator/emulator -avd test_avd \
            -no-window -no-audio -no-snapshot \
            -no-boot-anim -gpu swiftshader_indirect &
          adb wait-for-device shell \
            'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
          adb shell input keyevent 82
          ./gradlew :app:connectedDebugAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/connected/
